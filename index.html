<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANTONÍ</title>

  <style>
    :root {
      --orange: #db663f;
      --text: #111111;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      background: var(--orange);
      color: var(--text);
      font-family: "Arial Narrow", "Helvetica Neue", Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    body {
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .page {
      padding: 2rem 2rem 3rem;
      max-width: 1280px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
    }

    .logo-text {
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .menu {
      text-align: right;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .menu div {
      margin-bottom: 0.05rem;
    }

    .cover {
      margin-top: 1rem;
      margin-bottom: 1rem;
      width: 100%;
      max-width: 820px;
      margin-left: auto;
      margin-right: auto;
    }

    .vinyl {
      margin-top: 0.8rem;
      margin-bottom: 1.5rem;
      width: 100%;
      max-width: 820px;
      margin-left: auto;
      margin-right: auto;
      opacity: 0.9;
    }

    .contact-block {
      text-align: center;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-top: 1.5rem;
    }

    .contact-title {
      margin-bottom: 0.6rem;
      font-weight: 700; /* jetzt fett */
      letter-spacing: 0.06em;
    }

    .row {
      margin-bottom: 0.3rem;
    }

    @media (max-width: 700px) {
      .page {
        padding: 1rem 1rem 2rem;
      }

      .header {
        flex-direction: column;
        gap: 1rem;
      }

      .menu {
        text-align: left;
      }

      .logo-text {
        font-size: 1.8rem;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <div class="header">
      <div class="logo-text">ANTONÍ</div>

      <div class="menu">
        <div>
          <a href="https://sono.promo/holding-tight" target="_blank" rel="noreferrer">
            Holding Tight Lightly
          </a>
        </div>
        <div>
          <a href="https://antoni-music.bandcamp.com/" target="_blank" rel="noreferrer">
            Bandcamp
          </a>
        </div>
        <div>
          <a href="https://www.youtube.com/channel/UCPyQuCURbptinYXZKnuP1zA" target="_blank" rel="noreferrer">
            Videos
          </a>
        </div>
        <div>
          <a href="https://preview.mailerlite.io/preview/2242006/forms/183901895225509259?fresh=1/popup" target="_blank" rel="noreferrer">
            Newsletter
          </a>
        </div>
      </div>
    </div>

    <img class="cover" src="Albumcover_Zeynep_Ozkanca.jpg" alt="Album Cover" />

    <img class="vinyl" src="vinyl_back.png" alt="Vinyl back" />

    <div class="contact-block">
      <div class="contact-title">Contact</div>

      <div class="row">
        Label -
        <a href="https://www.listenrecords-shop.com/produkte" target="_blank" rel="noreferrer">
          Listenrecords
        </a>
      </div>

      <div class="row">
        Booking -
        <a href="https://cabinartists.com/" target="_blank" rel="noreferrer">
          Cabin Artists
        </a>
      </div>

      <div class="row">
        Publisher -
        <a href="https://www.kicktheflame.de/de" target="_blank" rel="noreferrer">
          Kick The Flame
        </a>
      </div>
    </div>

  </main>
</body>
</html>
