<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANTONI</title>

  <style>
    :root {
      --orange: #db663f;
      --text: #111111;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--orange);
      color: var(--text);
      font-family: "Arial Narrow", "Helvetica Neue", Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    body {
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
      text-underline-offset: 0.12em;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .page {
      min-height: 100vh;
      padding: 2rem;
    }

    .layout {
      position: relative;
      width: min(1280px, 100%);
      min-height: 90vh;
      margin: 0 auto;
    }

    .cutout {
      position: absolute;
    }

    /* ===================== */
    /* ZENTRALES ALBUM COVER */
    /* ===================== */
    .cover {
      position: absolute;
      top: 50%;
      left: 50%;

      transform: translate(-50%, -50%);

      width: clamp(420px, 55vw, 720px);

      z-index: 1;
    }

    /* ===================== */
    /* LOGO */
    /* ===================== */
    .logo-tab {
      top: 1rem;
      left: 1rem;
      width: clamp(180px, 14vw, 260px);

      mix-blend-mode: multiply;
      filter: contrast(1.2) brightness(0.9);

      z-index: 5;
    }

    /* ===================== */
    /* MENU + LINKS */
    /* ===================== */
    .top-links {
      position: absolute;
      top: 1.2rem;
      right: 1rem;

      display: flex;
      flex-direction: column;
      align-items: flex-end;

      gap: 0.2rem;
      font-size: 0.9rem;
      text-align: right;

      z-index: 5;
    }

    /* ===================== */
    /* LIVE */
    /* ===================== */
    .live-block {
      position: absolute;
      top: 6.5rem;
      right: 1rem;

      width: 260px;

      text-align: right;
      font-size: 0.9rem;
      line-height: 1.4;

      z-index: 5;
    }

    .live-block .title {
      margin-bottom: 0.4rem;
    }

    /* ===================== */
    /* CONTACT UNTEN */
    /* ===================== */
    .contact-block {
      position: absolute;
      bottom: 2rem;
      left: 50%;

      transform: translateX(-50%);

      text-align: center;
      font-size: 0.9rem;
      line-height: 1.5;

      z-index: 5;
    }

    .contact-tab {
      width: 200px;
      margin: 0 auto 0.6rem;

      mix-blend-mode: multiply;
      filter: contrast(1.15) brightness(0.95);
    }

    .contact-block .row {
      margin-bottom: 0.3rem;
    }

    /* ===================== */
    /* MOBILE */
    /* ===================== */
    @media (max-width: 900px) {

      .layout {
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
      }

      .cover,
      .logo-tab,
      .top-links,
      .live-block,
      .contact-block {
        position: static;
        transform: none;
        width: 100%;
      }

      .cover {
        max-width: 520px;
        margin: 0 auto;
      }

      .top-links,
      .live-block,
      .contact-block {
        text-align: left;
        align-items: flex-start;
      }
    }

  </style>
</head>

<body>
  <main class="page">
    <section class="layout">

      <!-- ALBUM COVER -->
      <img class="cover" src="Albumcover_Zeynep_Ozkanca.jpg" alt="Album Cover" />

      <!-- LOGO -->
      <img class="logo-tab" src="antoni.jpg" alt="Antoni logo" />

      <!-- MENU -->
      <div class="top-links">
        <span>Holding Tight Lightly</span>
        <a href="https://antoni-music.bandcamp.com/" target="_blank" rel="noreferrer">Bandcamp</a>
        <a href="https://www.youtube.com/channel/UCPyQuCURbptinYXZKnuP1zA" target="_blank" rel="noreferrer">Videos</a>
      </div>

      <!-- LIVE -->
      <div class="live-block">
        <div class="title">Live</div>
        <div>07.05. <a href="https://www.feinkostlampe.de/" target="_blank">Hannover Feinkost Lampe</a></div>
        <div>03.07. <a href="https://www.rudolstadt-festival.de/startseite.html" target="_blank">Rudolstadt Festival</a></div>
        <div>31.07. <a href="https://www.borwaerk.org/" target="_blank">Festival L*abore</a></div>
      </div>

      <!-- CONTACT -->
      <div class="contact-block">
        <img class="contact-tab" src="contact.jpg" alt="Contact" />
        <div class="row">Label - <a href="https://www.listenrecords-shop.com/produkte" target="_blank">Listenrecords</a></div>
        <div class="row">Booking - <a href="https://cabinartists.com/" target="_blank">Cabin Artists</a></div>
        <div class="row">Publisher - <a href="https://www.kicktheflame.de/de" target="_blank">Kick The Flame</a></div>
      </div>

    </section>
  </main>
</body>
</html>
