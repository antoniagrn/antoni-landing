<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANTONI</title>

  <style>
    :root {
      --orange: #db663f;
      --text: #111111;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      background: var(--orange);
      color: var(--text);
      font-family: "Arial Narrow", "Helvetica Neue", Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    /* Scroll wieder erlaubt (kein overflow hidden mehr!) */
    body {
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .page {
      padding: 2rem 1.5rem 3rem;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ===================== */
    /* HEADER */
    /* ===================== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
    }

    .logo-text {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .menu {
      text-align: right;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    /* ===================== */
    /* COVER */
    /* ===================== */
    .cover {
      margin-top: 1.5rem; /* Abstand zum oberen Rand */
      margin-bottom: 1.2rem;

      width: 100%;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ===================== */
    /* VINYL TEXTURE */
    /* ===================== */
    .vinyl {
      margin-top: 0.8rem;
      margin-bottom: 1.5rem;

      width: 100%;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;

      opacity: 0.9;
    }

    /* ===================== */
    /* LIVE */
    /* ===================== */
    .live {
      text-align: center;
      margin-bottom: 2rem;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .live .title {
      margin-bottom: 0.4rem;
    }

    /* ===================== */
    /* CONTACT */
    /* ===================== */
    .contact-block {
      text-align: center;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-top: 1.5rem;
    }

    .contact-title {
      margin-bottom: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.06em;
    }

    .row {
      margin-bottom: 0.3rem;
    }

    /* ===================== */
    /* MOBILE */
    /* ===================== */
    @media (max-width: 600px) {
      .header {
        flex-direction: column;
        gap: 1rem;
      }

      .menu {
        text-align: left;
      }

      .logo-text {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <!-- HEADER -->
    <div class="header">
      <div class="logo-text">Antoni</div>

      <div class="menu">
        <div>Holding Tight Lightly</div>
        <div><a href="https://antoni-music.bandcamp.com/" target="_blank">Bandcamp</a></div>
        <div><a href="https://www.youtube.com/channel/UCPyQuCURbptinYXZKnuP1zA" target="_blank">Videos</a></div>
      </div>
    </div>

    <!-- COVER -->
    <img class="cover" src="Albumcover_Zeynep_Ozkanca.jpg" alt="Album Cover" />

    <!-- VINYL -->
    <img class="vinyl" src="vinyl_back.png" alt="Vinyl texture" />

    <!-- LIVE -->
    <div class="live">
      <div class="title">Live</div>
      <div>07.05. <a href="https://www.feinkostlampe.de/" target="_blank">Hannover Feinkost Lampe</a></div>
      <div>03.07. <a href="https://www.rudolstadt-festival.de/startseite.html" target="_blank">Rudolstadt Festival</a></div>
      <div>31.07. <a href="https://www.borwaerk.org/" target="_blank">Festival L*abore</a></div>
    </div>

    <!-- CONTACT -->
    <div class="contact-block">
      <div class="contact-title">Contact</div>

      <div class="row">
        Label - <a href="https://www.listenrecords-shop.com/produkte" target="_blank">Listenrecords</a>
      </div>

      <div class="row">
        Booking - <a href="https://cabinartists.com/" target="_blank">Cabin Artists</a>
      </div>

      <div class="row">
        Publisher - <a href="https://www.kicktheflame.de/de" target="_blank">Kick The Flame</a>
      </div>
    </div>

  </main>
</body>
</html>
